name: CountdownBlocks
options:
  bundleIdPrefix: com.countdownblocks
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  
settings:
  SWIFT_VERSION: "5.9"
  
targets:
  CountdownBlocks:
    type: application
    platform: iOS
    bundleIdPrefix: com.countdownblocks
    sources:
      - CountdownBlocks
    info:
      path: CountdownBlocks/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.countdownblocks.CountdownBlocks
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: CountdownBlocks/CountdownBlocks.entitlements
    entitlements:
      path: CountdownBlocks/CountdownBlocks.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.countdownblocks.shared
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
    # Widget temporarily disabled - uncomment when fixed
    # dependencies:
    #   - target: CountdownBlocksWidgetExtension
    #     embed: true
        
  CountdownBlocksWidgetExtensionDISABLED:
    type: app-extension
    platform: iOS
    sources:
      - CountdownBlocksWidget
    info:
      path: CountdownBlocksWidget/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.countdownblocks.CountdownBlocks.WidgetExtension
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: CountdownBlocksWidget/CountdownBlocksWidget.entitlements
    entitlements:
      path: CountdownBlocksWidget/CountdownBlocksWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.countdownblocks.shared

schemes:
  CountdownBlocks:
    build:
      targets:
        CountdownBlocks: all
        # CountdownBlocksWidgetExtensionDISABLED: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
